<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Fornecedores</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Sistema</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="clientes.html">Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="categorias.html">Categorias</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="fornecedores.html">Fornecedores</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>Cadastro de Fornecedores</h3>

        <input id="nome" class="form-control mb-2" placeholder="Nome">

        <input id="cnpj" type="number" class="form-control mb-2" placeholder="CNPJ">

        <input id="email" type="email" class="form-control mb-3" placeholder="Email">

        <label><strong>Estado:</strong></label><br>

        <div class="form-check">
            <input class="form-check-input" type="radio" name="estado" value="SP">
            <label class="form-check-label">SP</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="radio" name="estado" value="RJ">
            <label class="form-check-label">RJ</label>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="radio" name="estado" value="MG">
            <label class="form-check-label">MG</label>
        </div>

        <button id="salvar" class="btn btn-primary">Salvar</button>
    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <script src="fornecedores.js"></script>

</body>

</html>
